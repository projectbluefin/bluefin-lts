name: Pytest

on:
  pull_request:
    branches:
      - main
    paths:
      - tests/test_changelogs.py
      - .github/changelogs.py
      - .github/changelog_config.yaml
  push:
    branches:
      - main
      - testing
  workflow_dispatch:

jobs:
  pytest:
    name: Run pytest for changelogs.py
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install Python deps
        run: pip install pytest pyyaml

      - name: Run pytest
        run: pytest tests/test_changelogs.py -v
