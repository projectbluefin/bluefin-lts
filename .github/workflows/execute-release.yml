name: Execute Release

# Triggered by a push to lts whose commit message starts with
# "chore: promote main to lts" — the squash commit produced by
# promote-testing-to-main.yml when auto/promote-testing-to-main merges
# into lts.

on:
  push:
    branches:
      - lts
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      is-promotion: ${{ steps.check.outputs.is-promotion }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ] || echo "$COMMIT_MSG" | grep -q "^chore: promote main to lts"; then
            echo "is-promotion=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-promotion=false" >> "$GITHUB_OUTPUT"
          fi

  execute:
    needs: [check-trigger]
    if: needs.check-trigger.outputs.is-promotion == 'true'
    permissions:
      actions: read
      contents: write
      issues: write
      packages: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-execute-release.yml@v1
    with:
      registry: ghcr.io/projectbluefin
      variants: >-
        [
          {"image":"bluefin-lts","source_tag":"testing","target_tag":"lts"},
          {"image":"bluefin-lts-hwe","source_tag":"testing","target_tag":"lts"},
          {"image":"bluefin-lts-hwe-nvidia","source_tag":"testing","target_tag":"lts"}
        ]
      fast_forward_branch: lts
      cosign_identity_regexp: ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
    secrets: inherit

  release-notes:
    needs: [execute]
    if: always() && needs.execute.result == 'success'
    permissions:
      actions: read
      contents: write
      id-token: write
      packages: read
    # Use bluefin-lts-hwe as the primary image so the HWE (CoreOS stable) kernel
    # version appears in the Key components table instead of the base CentOS kernel.
    uses: projectbluefin/actions/.github/workflows/reusable-release.yml@v1
    with:
      stream_name: lts
      image: ghcr.io/projectbluefin/bluefin-lts-hwe
      generate_sbom_inline: true
      checkout_ref: lts
      project_name: Bluefin LTS
      badge_label: LTS
      accent_color: "#0ea5e9"
      cert_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
      notable_packages: >-
        [
          {"sbom_name": "kernel", "label": "Kernel (HWE)"},
          {"sbom_name": "gnome-shell", "label": "GNOME Shell"},
          {"sbom_name": "flatpak", "label": "Flatpak"},
          {"sbom_name": "bootc", "label": "bootc"}
        ]
      docs_url: https://docs.projectbluefin.io/changelogs
    secrets: inherit

  post-release-variants:
    # Prepend a variants table to the release body so all promoted images are listed.
    needs: [execute, release-notes]
    if: always() && needs.release-notes.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve promoted digests
        id: digests
        run: |
          set -euo pipefail
          for image in bluefin-lts bluefin-lts-hwe bluefin-lts-hwe-nvidia; do
            digest=$(skopeo inspect --no-tags "docker://ghcr.io/projectbluefin/${image}:lts" \
              | jq -r '.Digest' | cut -c1-19)
            echo "${image}=${digest}" >> "$GITHUB_OUTPUT"
          done

      - name: Prepend variants table to release
        env:
          LTS_DIGEST: ${{ steps.digests.outputs.bluefin-lts }}
          HWE_DIGEST: ${{ steps.digests.outputs.bluefin-lts-hwe }}
          NVIDIA_DIGEST: ${{ steps.digests.outputs.bluefin-lts-hwe-nvidia }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')
          CURRENT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body')

          VARIANTS_SECTION=$(printf '%s\n' \
            '## Variants promoted' \
            '' \
            '| Variant | Tag | Digest |' \
            '|---|---|---|' \
            "| \`bluefin-lts\` | \`:lts\` | \`${LTS_DIGEST}\` |" \
            "| \`bluefin-lts-hwe\` | \`:lts\` | \`${HWE_DIGEST}\` |" \
            "| \`bluefin-lts-hwe-nvidia\` | \`:lts\` | \`${NVIDIA_DIGEST}\` |" \
            '' \
            '> **bluefin-lts-hwe** and **bluefin-lts-hwe-nvidia** use the Fedora CoreOS stable kernel. The **Kernel (HWE)** version above applies to both.' \
            '' \
            '---' \
            '')
          printf '%s\n%s' "$VARIANTS_SECTION" "$CURRENT" > /tmp/updated-body.md
          gh release edit "$TAG" --repo "${{ github.repository }}" --notes-file /tmp/updated-body.md

  tag-stable:
    # Create :stable as a floating alias for :lts on every release.
    # Makes the production tag discoverable without knowing the lts branch model.
    needs: [execute]
    if: always() && needs.execute.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io/projectbluefin
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update -q
          sudo apt-get install -y skopeo

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Copy :lts → :stable for all variants
        run: |
          set -euo pipefail
          for image in bluefin-lts bluefin-lts-hwe bluefin-lts-hwe-nvidia; do
            DIGEST=$(skopeo inspect --no-tags "docker://${REGISTRY}/${image}:lts" \
              | jq -er '.Digest')
            echo "Tagging ${image}@${DIGEST} as :stable"
            skopeo copy \
              "docker://${REGISTRY}/${image}@${DIGEST}" \
              "docker://${REGISTRY}/${image}:stable"
            echo "  ✅ ${image}:stable → ${image}@${DIGEST}"
          done
