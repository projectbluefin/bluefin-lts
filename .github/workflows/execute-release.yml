name: Execute Release

# Triggered by a push to main whose commit message starts with
# "chore: promote testing to main" — the squash commit produced by
# promote-testing-to-main.yml when auto/promote-testing-to-main merges
# into main.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      is-promotion: ${{ steps.check.outputs.is-promotion }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ] || echo "$COMMIT_MSG" | grep -q "^chore: promote testing to main"; then
            echo "is-promotion=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-promotion=false" >> "$GITHUB_OUTPUT"
          fi

  execute:
    needs: [check-trigger]
    if: needs.check-trigger.outputs.is-promotion == 'true'
    permissions:
      actions: read
      contents: write
      issues: write
      packages: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-execute-release.yml@v1
    with:
      registry: ghcr.io/projectbluefin
      variants: >-
        [
          {"image":"bluefin-lts","source_tag":"testing","target_tag":"stable"},
          {"image":"bluefin-lts-hwe","source_tag":"testing","target_tag":"stable"},
          {"image":"bluefin-lts-hwe-nvidia","source_tag":"testing","target_tag":"stable"}
        ]
      cosign_identity_regexp: ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
    secrets: inherit

  resolve-base-kernel:
    needs: [execute]
    if: always() && needs.execute.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      extra_components_json: ${{ steps.kernel.outputs.extra_components_json }}
      variants_json: ${{ steps.variants.outputs.variants_json }}
    steps:
      - name: Resolve base kernel version
        id: kernel
        env:
          REGISTRY: ghcr.io/projectbluefin
        run: |
          set -euo pipefail
          BASE_KERNEL=$(skopeo inspect --no-tags \
            "docker://${REGISTRY}/bluefin-lts:stable" \
            | jq -r '.Labels["ostree.linux"] // empty' \
            | grep -oP '[\d\.\-]+el\d+' | head -1 || true)
          if [[ -n "${BASE_KERNEL:-}" ]]; then
            echo "extra_components_json=[{\"label\":\"Kernel (Base)\",\"version\":\"${BASE_KERNEL}\"}]" \
              >> "$GITHUB_OUTPUT"
          else
            echo "extra_components_json=[]" >> "$GITHUB_OUTPUT"
          fi

      - name: Build variants JSON
        id: variants
        env:
          DIGESTS: ${{ needs.execute.outputs.promoted_digests }}
        run: |
          set -euo pipefail
          LTS=$(echo "$DIGESTS" | jq -r '.["bluefin-lts"]')
          HWE=$(echo "$DIGESTS" | jq -r '.["bluefin-lts-hwe"]')
          NVIDIA=$(echo "$DIGESTS" | jq -r '.["bluefin-lts-hwe-nvidia"]')
          VARIANTS=$(jq -cn \
            --arg lts "$LTS" --arg hwe "$HWE" --arg nv "$NVIDIA" \
            '[
              {"name":"bluefin-lts","tag":":stable","digest":$lts},
              {"name":"bluefin-lts-hwe","tag":":stable","digest":$hwe,"note":"Uses Fedora CoreOS stable kernel"},
              {"name":"bluefin-lts-hwe-nvidia","tag":":stable","digest":$nv,"note":"Uses Fedora CoreOS stable kernel"}
            ]')
          echo "variants_json=${VARIANTS}" >> "$GITHUB_OUTPUT"

  release-notes:
    needs: [execute, resolve-base-kernel]
    if: always() && needs.execute.result == 'success'
    permissions:
      actions: read
      contents: write
      id-token: write
      packages: read
    # Use bluefin-lts-hwe as the primary image so the HWE (CoreOS stable) kernel
    # version appears in the Key components table instead of the base CentOS kernel.
    uses: projectbluefin/actions/.github/workflows/reusable-release.yml@v1
    with:
      stream_name: stable
      image: ghcr.io/projectbluefin/bluefin-lts-hwe
      generate_sbom_inline: true
      checkout_ref: main
      project_name: Bluefin LTS
      badge_label: LTS
      accent_color: "#0ea5e9"
      cert_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
      notable_packages: >-
        [
          {"sbom_name": "kernel", "label": "Kernel (HWE)"},
          {"sbom_name": "gnome-shell", "label": "GNOME Shell"},
          {"sbom_name": "podman", "label": "Podman"},
          {"sbom_name": "distrobox", "label": "Distrobox"},
          {"sbom_name": "systemd", "label": "systemd"},
          {"sbom_name": "mesa-vulkan-drivers", "label": "Mesa"},
          {"sbom_name": "pipewire", "label": "PipeWire"},
          {"sbom_name": "flatpak", "label": "Flatpak"},
          {"sbom_name": "bootc", "label": "bootc"}
        ]
      variants_json: ${{ needs.resolve-base-kernel.outputs.variants_json }}
      extra_components_json: ${{ needs.resolve-base-kernel.outputs.extra_components_json }}
      docs_url: https://docs.projectbluefin.io/changelogs
    secrets: inherit
