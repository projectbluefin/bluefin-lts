name: Execute Release

# Triggered by a push to lts whose commit message starts with
# "chore: promote main to lts" — the squash commit produced by
# promote-testing-to-main.yml when auto/promote-testing-to-main merges
# into lts.
#
# Why push instead of pull_request: closed:
# GitHub blocks pull_request-triggered workflows when the triggering PR was
# created by github-actions[bot] AND the PR modifies .github/workflows/ files.
# The promotion squash always carries SHA pin bumps from Renovate, so the
# pull_request: closed trigger produced startup_failed on every release.
# A push: [lts] trigger is not subject to this restriction.

on:
  push:
    branches:
      - lts

permissions:
  id-token: write

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      is-promotion: ${{ steps.check.outputs.is-promotion }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -q "^chore: promote main to lts"; then
            echo "is-promotion=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-promotion=false" >> "$GITHUB_OUTPUT"
          fi

  execute:
    needs: [check-trigger]
    if: needs.check-trigger.outputs.is-promotion == 'true'
    permissions:
      actions: read
      contents: write
      issues: write
      packages: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-execute-release.yml@cdc34cf64c8a92293cc3cd8584b4c02e31d78c9e # v1
    with:
      registry: ghcr.io/projectbluefin
      variants: >-
        [
          {"image":"bluefin-lts","source_tag":"testing","target_tag":"lts"},
          {"image":"bluefin-lts-hwe","source_tag":"testing","target_tag":"lts"},
          {"image":"bluefin-gdx","source_tag":"testing","target_tag":"lts"}
        ]
      fast_forward_branch: lts
      cosign_identity_regexp: ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
    secrets: inherit

  release-notes:
    needs: [execute]
    if: always() && needs.execute.result == 'success'
    permissions:
      actions: read
      contents: write
      id-token: write
      packages: read
    uses: projectbluefin/actions/.github/workflows/reusable-release.yml@cdc34cf64c8a92293cc3cd8584b4c02e31d78c9e # v1
    with:
      stream_name: lts
      image: ghcr.io/projectbluefin/bluefin-lts
      generate_sbom_inline: true
      checkout_ref: lts
      project_name: Bluefin LTS
      badge_label: LTS
      accent_color: "#0ea5e9"
      cert_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
      notable_packages: >-
        [
          {"sbom_name": "kernel", "label": "Kernel"},
          {"sbom_name": "gnome-shell", "label": "GNOME Shell"},
          {"sbom_name": "flatpak", "label": "Flatpak"},
          {"sbom_name": "bootc", "label": "bootc"}
        ]
      docs_url: https://docs.projectbluefin.io/changelogs
    secrets: inherit
