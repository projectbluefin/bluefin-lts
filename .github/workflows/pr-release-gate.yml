name: PR Release Gate

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  gate:
    if: github.event.pull_request.head.ref == 'auto/promote-testing-to-main'
    permissions:
      actions: read
      contents: read
      issues: write
      packages: read
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-gate.yml@4d46a63f49ed0159e2f5958a2109cc936a50417e # v1
    with:
      repo: ${{ github.repository }}
      registry: ghcr.io/projectbluefin
      variants: >-
        [{"image":"bluefin-lts"},{"image":"bluefin-lts-hwe"},{"image":"bluefin-gdx"}]
      cosign_identity_regexp: ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
      target_tag: testing
      run_e2e: true
      e2e_suites: smoke,common
      e2e_image: ghcr.io/projectbluefin/bluefin-lts-hwe:testing
    secrets: inherit
