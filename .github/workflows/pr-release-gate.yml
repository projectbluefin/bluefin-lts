name: PR Release Gate

# Runs the release gate checks on the promotion PR targeting the lts branch.
# Mirrors the equivalent workflow in projectbluefin/bluefin, adapted for the
# lts branch model (main → lts instead of testing → main).

on:
  pull_request:
    branches:
      - lts

permissions: {}

jobs:
  gate:
    if: github.event.pull_request.head.ref == 'auto/promote-testing-to-main'
    permissions:
      actions: read
      contents: read
      issues: write
      packages: read
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-gate.yml@v1
    with:
      repo: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      registry: ghcr.io/projectbluefin
      variants: >-
        [{"image":"bluefin-lts"},{"image":"bluefin-lts-hwe"},{"image":"bluefin-lts-hwe-nvidia"}]
      cosign_identity_regexp: ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
      target_tag: testing
      run_e2e: true
      e2e_suites: smoke,common
      e2e_image: ghcr.io/projectbluefin/bluefin-lts-hwe:testing
    secrets: inherit
