name: Post-Merge E2E — Testing Gate

# Runs e2e smoke tests after every successful push build on main or testing.
# Gates :testing — the stream tag is NOT published by the build (publish_stream_tag: false
# in build-regular-hwe.yml). This workflow promotes :testing only after smoke passes.
on:
  workflow_run:
    workflows:
      - Build Bluefin LTS HWE
    types:
      - completed
    branches: [main, testing]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: post-merge-e2e-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  get-image:
    name: Resolve test image
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'testing'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      image: ${{ steps.get-digest.outputs.image }}
    steps:
      - name: Download build digest
        id: get-digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual re-run: test the currently published :testing image
            echo "image=ghcr.io/${{ github.repository_owner }}/bluefin-lts-hwe:testing" >> "$GITHUB_OUTPUT"
            echo "Manual run: testing ghcr.io/${{ github.repository_owner }}/bluefin-lts-hwe:testing"
          else
            gh run download "${{ github.event.workflow_run.id }}" \
              --repo "${{ github.repository }}" \
              --name "image-digest-testing-bluefin-lts-hwe-main-x86_64" \
              --dir /tmp/digest
            DIGEST=$(grep "^bluefin-lts-hwe=" /tmp/digest/*.txt | head -1 | cut -d= -f2-)
            echo "image=ghcr.io/${{ github.repository_owner }}/bluefin-lts-hwe@${DIGEST}" >> "$GITHUB_OUTPUT"
            echo "Testing image: ghcr.io/${{ github.repository_owner }}/bluefin-lts-hwe@${DIGEST}"
          fi

  e2e-smoke:
    name: E2E smoke + common
    needs: [get-image]
    if: needs.get-image.outputs.image != ''
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ${{ needs.get-image.outputs.image }}
      suites: smoke,common
    secrets: inherit

  promote-to-testing:
    name: Promote verified digests to :testing
    needs: [get-image, e2e-smoke]
    if: needs.e2e-smoke.result == 'success' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
    steps:
      - name: Download all testing image digests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ github.event.workflow_run.id }}" \
            --repo "${{ github.repository }}" \
            --pattern "image-digest-testing-*" \
            --dir /tmp/all-digests

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "$GH_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Promote verified digests to :testing
        run: |
          set -euo pipefail
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          PROMOTED=0

          while IFS= read -r -d '' f; do
            while IFS='=' read -r image_name digest; do
              [[ -z "${image_name}" || -z "${digest}" || "${image_name}" == *"|"* ]] && continue
              SRC="docker://${REGISTRY}/${image_name}@${digest}"
              DST="docker://${REGISTRY}/${image_name}:testing"
              echo "Promoting ${image_name}@${digest} → :testing"
              skopeo copy --all "${SRC}" "${DST}"
              echo "  ✅ ${image_name}:testing updated"
              PROMOTED=$((PROMOTED + 1))
            done < "$f"
          done < <(find /tmp/all-digests -name "*.txt" -print0)

          echo "✅ Promoted ${PROMOTED} flavor(s) to :testing"

