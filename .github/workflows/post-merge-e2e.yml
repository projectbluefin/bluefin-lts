name: Post-Merge Testing Gate

# Promotes :testing immediately after a successful build — no post-merge E2E.
# PR validation (pr-testsuite.yml) already gates every change before merge.
# :testing is NOT published by the build itself (publish_stream_tag: false in
# build-regular-hwe.yml); this workflow does the promotion.
on:
  workflow_run:
    workflows:
      - Build Bluefin LTS HWE
    types:
      - completed
    branches: [main, testing]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: post-merge-testing-gate-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  promote-to-testing:
    name: Promote verified digests to :testing
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'testing'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
    steps:
      - name: Download all testing image digests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ github.event.workflow_run.id }}" \
            --repo "${{ github.repository }}" \
            --pattern "image-digest-testing-*" \
            --dir /tmp/all-digests

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "$GH_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Promote verified digests to :testing
        run: |
          set -euo pipefail
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          PROMOTED=0

          while IFS= read -r -d '' f; do
            while IFS='=' read -r image_name digest; do
              [[ -z "${image_name}" || -z "${digest}" || "${image_name}" == *"|"* ]] && continue
              SRC="docker://${REGISTRY}/${image_name}@${digest}"
              DST="docker://${REGISTRY}/${image_name}:testing"
              echo "Promoting ${image_name}@${digest} → :testing"
              skopeo copy --all "${SRC}" "${DST}"
              echo "  ✅ ${image_name}:testing updated"
              PROMOTED=$((PROMOTED + 1))
            done < "$f"
          done < <(find /tmp/all-digests -name "*.txt" -print0)

          echo "✅ Promoted ${PROMOTED} flavor(s) to :testing"
