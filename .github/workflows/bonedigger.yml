name: issue and PR lifecycle

on:
  issues:
    types: [opened, labeled, closed]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  schedule:
    - cron: '0 9 * * *'

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  lifecycle:
    uses: projectbluefin/bonedigger/.github/workflows/lifecycle.yml@v1
    with:
      brand_name: "Bluefin LTS"
      brand_emoji: "🦕"
    secrets: inherit
