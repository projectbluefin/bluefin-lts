name: Promote testing to main

# Opens and maintains a squash promotion PR from testing → main.
# Auto-merges via enablePullRequestAutoMerge (--auto) — no human approval required.
# main branch protection requires 0 reviews; gate checks are the only gate.
#
# Factory-standard branch model: source_branch=testing, target_branch=main.
# Compares testing vs main trees and opens auto/promote-testing-to-main → main
# when they differ. On merge, execute-release.yml fires and publishes :stable.
#
# Triggers:
#   - push to testing (immediate re-evaluation after every merge)
#   - daily 04:00 UTC — matches bluefin cadence

on:
  push:
    branches: [testing]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: promote-testing-to-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: read
  actions: read

jobs:
  promote:
    uses: projectbluefin/actions/.github/workflows/reusable-promote-squash.yml@v1
    with:
      variants: >-
        [{"image":"bluefin-lts"},{"image":"bluefin-lts-hwe"},{"image":"bluefin-lts-hwe-nvidia"}]
      cosign_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
      run_e2e: false
      source_branch: testing
      target_branch: main
      # main uses a merge queue ruleset (17070416): gh pr merge --auto is blocked.
      # use_merge_queue: true calls enqueuePullRequest GraphQL instead, which
      # places the PR in the queue and lets it squash-merge once checks pass.
      use_merge_queue: true
    secrets: inherit
