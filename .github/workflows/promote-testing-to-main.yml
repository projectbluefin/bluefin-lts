name: Promote testing to main

# Thin caller — logic lives in projectbluefin/actions/reusable-promote-squash.yml
#
# Branch model for bluefin-lts: main → lts
# source_branch=main, target_branch=lts compares main vs lts trees and
# opens auto/promote-testing-to-main → lts when they differ.
#
# Closes: #172

on:
  push:
    branches:
      - testing
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Post-Merge E2E — Testing Parity", "Sync main → testing"]
    types: [completed]
    branches: [main]

concurrency:
  group: promote-testing-to-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: read
  actions: read

jobs:
  promote:
    uses: projectbluefin/actions/.github/workflows/reusable-promote-squash.yml@v1
    with:
      variants: >-
        [{"image":"bluefin-lts"},{"image":"bluefin-lts-hwe"},{"image":"bluefin-gdx"}]
      cosign_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
      run_e2e: true
      e2e_suites: smoke,common
      e2e_image: ghcr.io/projectbluefin/bluefin-lts-hwe:testing
      source_branch: main
      target_branch: lts
    secrets: inherit
