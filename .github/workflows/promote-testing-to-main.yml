name: Promote main to lts

# Opens and maintains a squash promotion PR from main → lts.
# Runs daily and on every push to testing so maintainers always have a
# current, ready-to-merge PR showing the delta since the last promotion.
#
# Branch model for bluefin-lts: source_branch=main, target_branch=lts.
# Compares main vs lts trees and opens auto/promote-testing-to-main → lts
# when they differ.

on:
  push:
    branches:
      - testing
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Post-Merge E2E — Testing Parity", "Sync main → testing"]
    types: [completed]
    branches: [main]

concurrency:
  group: promote-testing-to-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: read
  actions: read

jobs:
  promote:
    uses: projectbluefin/actions/.github/workflows/reusable-promote-squash.yml@v1
    with:
      variants: >-
        [{"image":"bluefin-lts"},{"image":"bluefin-lts-hwe"},{"image":"bluefin-gdx"}]
      cosign_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
      run_e2e: true
      e2e_suites: smoke,common
      e2e_image: ghcr.io/projectbluefin/bluefin-lts-hwe:testing
      source_branch: main
      target_branch: lts
    secrets: inherit
