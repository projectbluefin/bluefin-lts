name: Promote main to lts

# Opens and maintains a squash promotion PR from main → lts.
# Auto-merges via enablePullRequestAutoMerge (--auto) — no human approval required.
# lts branch protection requires 0 reviews; gate checks are the only gate.
#
# Branch model for bluefin-lts: source_branch=main, target_branch=lts.
# Compares main vs lts trees and opens auto/promote-testing-to-main → lts
# when they differ.
#
# Triggers:
#   - workflow_run on Post-Merge Testing Gate (fires after :testing is promoted post-build)
#   - weekly schedule Thursday 04:00 UTC as the guaranteed weekly release trigger

on:
  schedule:
    - cron: '0 4 * * 4'
  workflow_dispatch:
  workflow_run:
    workflows: ["Post-Merge Testing Gate"]
    types: [completed]
    branches: [main]

concurrency:
  group: promote-testing-to-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: read
  actions: read

jobs:
  promote:
    uses: projectbluefin/actions/.github/workflows/reusable-promote-squash.yml@v1
    with:
      variants: >-
        [{"image":"bluefin-lts"},{"image":"bluefin-lts-hwe"},{"image":"bluefin-lts-hwe-nvidia"}]
      cosign_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin-lts|actions)/\.github/workflows/
      run_e2e: false
      source_branch: main
      target_branch: lts
      use_merge_queue: false
    secrets: inherit
