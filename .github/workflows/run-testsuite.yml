name: Run Testsuite

# Canonical wrapper — always call this, never call projectbluefin/testsuite e2e.yml directly.
# Uses @v1 managed tag — testsuite auto-tracks v1 to main on every merge via update-v1-tag.yml.
# Never SHA-pin this ref; use @v1 so E2E picks up testsuite fixes immediately.
on:
  workflow_call:
    inputs:
      image:
        description: "Full image reference to test (e.g. ghcr.io/projectbluefin/bluefin-lts:testing)"
        required: true
        type: string
      suites:
        description: "Comma-separated list of test suites to run"
        required: true
        type: string

jobs:
  e2e:
    name: ${{ inputs.suites }}
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@8d9ca0b35a25a9c2072067fcdc145268f7e08be5 # v1
    with:
      image: ${{ inputs.image }}
      suites: ${{ inputs.suites }}
    secrets: inherit
