name: Run Testsuite

# Canonical wrapper — always call this, never call projectbluefin/testsuite e2e.yml directly.
# Uses @main (managed floating tag) — internal projectbluefin/ refs are never SHA-pinned.
# See docs/skills/ci-tooling.md for the internal vs external pin policy.
on:
  workflow_call:
    inputs:
      image:
        description: "Full image reference to test (e.g. ghcr.io/projectbluefin/bluefin-lts:testing)"
        required: true
        type: string
      suites:
        description: "Comma-separated list of test suites to run"
        required: true
        type: string

jobs:
  e2e:
    name: ${{ inputs.suites }}
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@341d95fc7efc3687c88545e6e02106e25da43470 # main
    with:
      image: ${{ inputs.image }}
      suites: ${{ inputs.suites }}
    secrets: inherit

