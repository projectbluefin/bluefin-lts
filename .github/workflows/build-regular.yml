name: Build Bluefin LTS

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write
  issues: write

on:
  pull_request:
    branches:
      - testing
    paths:
      - Containerfile
      - Justfile
      - build_scripts/**
      - system_files/**
      - image-versions.yaml
  push:
    branches:
      - testing
    paths-ignore:
      - '.github/workflows/**'
      - 'docs/**'
      - '**.md'
      - 'AGENTS.md'
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: projectbluefin/actions/bootc-build/detect-changes@v1
        id: detect
        with:
          filters: |
            image:
              - 'Containerfile'
              - 'build_scripts/**'
              - 'system_files/**'
              - 'image-versions.yaml'
              - 'Justfile'
            nvidia:
              - 'Containerfile'

  build:
    name: Build bluefin-lts image
    needs: [detect-changes]
    if: |
      always() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.should_build == 'true')
    uses: projectbluefin/actions/.github/workflows/reusable-build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
      issues: write
    secrets: inherit
    with:
      brand_name: bluefin-lts
      stream_name: testing
      image_flavors: '["main"]'
      architecture: '["x86_64"]'
      publish_stream_tag: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
