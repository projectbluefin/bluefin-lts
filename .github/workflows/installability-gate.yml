name: Installability Gate — Pre-Promotion

# Runs before promotion workflow to validate full installation path
# Spins up VM, runs full install (anaconda/knuckle), verifies boot and GNOME
on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image to test (e.g., ghcr.io/projectbluefin/bluefin:lts-testing)"
        required: true
        default: "ghcr.io/projectbluefin/bluefin:lts-testing"

permissions:
  contents: read
  packages: read

concurrency:
  group: installability-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installability-gate:
    name: Full install test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      IMAGE: ${{ inputs.image }}
      DISK_SIZE: 50G
    steps:
      - name: Checkout bluefin-lts for installer scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: projectbluefin/bluefin-lts
          ref: main

      - name: Free disk space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - name: Install prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            guestfs-tools \
            libguestfs-tools \
            expect

      - name: Pull test image
        run: |
          sudo podman pull "${IMAGE}"
          echo "✅ Image pulled: ${IMAGE}"

      - name: Create disk for anaconda install
        run: |
          # Create a large disk for a full anaconda installation
          fallocate -l "${DISK_SIZE}" install.raw
          echo "✅ Created ${DISK_SIZE} disk image"

      - name: Generate SSH keypair
        run: |
          ssh-keygen -t ed25519 -f /tmp/vm_key -N "" -C "installer@gha"
          echo "VM_PUBKEY=$(cat /tmp/vm_key.pub)" >> "$GITHUB_ENV"

      - name: Boot installer and run anaconda
        timeout-minutes: 60
        run: |
          # Extract installer from the image
          CONTAINER=$(sudo podman create "${IMAGE}")
          sudo podman cp "${CONTAINER}:/usr/libexec/anaconda-installer" ./anaconda-installer || \
          echo "Note: Anaconda installer pattern may vary per image variant"
          sudo podman rm "${CONTAINER}"

          # For LTS, we use either anaconda or knuckle depending on image
          # Boot the image as a live environment to run installation
          sudo qemu-system-x86_64 \
            -machine accel=kvm:tcg -m 8G -nographic \
            -drive file=install.raw,cache=none,aio=native,format=raw,index=0,media=disk \
            -cdrom <(sudo podman run --rm "${IMAGE}" bash -c 'cat /etc/os-release') \
            -boot once=d \
            -net user,hostfwd=tcp:127.0.0.1:2222-:22 \
            -net nic \
            -serial mon:stdio \
            -display none \
            2>&1 | tee installer.log &

          INSTALLER_PID=$!
          echo "INSTALLER_PID=${INSTALLER_PID}" >> "$GITHUB_ENV"

          # Wait for installer to complete or timeout after 50 minutes
          sleep 5
          for i in {1..600}; do
            if ps -p $INSTALLER_PID > /dev/null 2>&1; then
              if grep -q "Installation complete\|reboot\|Completed" installer.log 2>/dev/null; then
                echo "✅ Installation completed at attempt $i"
                break
              fi
              if (( i % 30 == 0 )); then
                echo "Installer still running... ($(( i / 10 )) min elapsed)"
              fi
              sleep 5
            else
              echo "Installer exited (may have rebooted)"
              break
            fi
          done

      - name: Boot installed system
        timeout-minutes: 30
        run: |
          # Boot the newly installed system
          # Extract kernel from install.raw
          LOOP=$(sudo losetup -f --show -P install.raw)
          echo "LOOP_DEVICE=${LOOP}" >> "$GITHUB_ENV"

          ROOT_PART=$(sudo fdisk -l "${LOOP}" | grep "^${LOOP}" | awk '{print $1}' | head -1)
          if [[ -z "${ROOT_PART}" ]]; then
            echo "ERROR: Could not identify root partition"
            sudo fdisk -l "${LOOP}"
            exit 1
          fi

          echo "ROOT_PART=${ROOT_PART}"

          sudo mkdir -p /mnt/install
          sudo mount "${ROOT_PART}" /mnt/install || true

          # Try to find kernel and initramfs
          VMLINUZ=$(sudo find /mnt/install -name "vmlinuz*" -type f 2>/dev/null | head -1)
          INITRAMFS=$(sudo find /mnt/install -name "initramfs*.img" -type f 2>/dev/null | head -1)

          if [[ -z "${VMLINUZ}" ]]; then
            echo "ERROR: Could not locate kernel in installed system"
            echo "Contents of /boot:"
            sudo ls -la /mnt/install/boot/
            exit 1
          fi

          # Extract to workspace
          sudo cp "${VMLINUZ}" ./vmlinuz || true
          sudo cp "${INITRAMFS}" ./initramfs.img || true
          sudo chown runner:runner ./vmlinuz ./initramfs.img

          # Get UUID for boot
          BOOT_UUID=$(sudo blkid -s UUID -o value "${ROOT_PART}")
          echo "ROOT_UUID=${BOOT_UUID}" >> "$GITHUB_ENV"

          # Set up for SSH
          for DEP in $(sudo find /mnt/install/ostree/deploy/default/deploy -maxdepth 1 -mindepth 1 -type d 2>/dev/null); do
            sudo mkdir -p "${DEP}/etc/systemd/system/multi-user.target.wants/"
            sudo ln -sf /usr/lib/systemd/system/sshd.service \
              "${DEP}/etc/systemd/system/multi-user.target.wants/sshd.service" || true

            sudo ssh-keygen -A -f "${DEP}" 2>/dev/null || true
            echo "${VM_PUBKEY}" | sudo tee "${DEP}/etc/ssh/ci-authorized-keys" || true
          done

      - name: Verify boot and GNOME
        timeout-minutes: 20
        run: |
          # Boot installed system
          KERNEL_ARGS="root=UUID=${ROOT_UUID} rw systemd.firstboot=no console=ttyS0,115200"

          sudo qemu-system-x86_64 \
            -machine accel=kvm:tcg -m 4G -nographic \
            -kernel ./vmlinuz \
            -initrd ./initramfs.img \
            -append "${KERNEL_ARGS}" \
            -drive file=install.raw,cache=none,aio=native,format=raw,index=0,media=disk \
            -net user,hostfwd=tcp:127.0.0.1:2222-:22 \
            -net nic \
            -serial mon:stdio \
            2>&1 | tee boot.log &

          BOOT_PID=$!
          echo "BOOT_PID=${BOOT_PID}" >> "$GITHUB_ENV"

          # Wait for SSH
          sleep 30
          for i in {1..120}; do
            if ssh -i /tmp/vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                 -p 2222 root@127.0.0.1 true 2>/dev/null; then
              echo "✅ SSH connected successfully"
              break
            fi
            if (( i % 10 == 0 )); then
              echo "Waiting for SSH... (attempt $i/120)"
            fi
            sleep 5
          done

      - name: Validate installed system
        run: |
          # Run smoke checks to verify installation
          ssh -i /tmp/vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -p 2222 root@127.0.0.1 << 'EOF'
          set -euo pipefail

          echo "Checking system health..."

          # Verify ostree deployment
          if command -v ostree &> /dev/null; then
            ostree admin status || true
            echo "✅ OSTree deployment verified"
          fi

          # Check for GNOME (might not be fully started in VM, but should be installable)
          if rpm -q gnome-shell 2>/dev/null || \
             dpkg -l | grep -q gnome-shell 2>/dev/null; then
            echo "✅ GNOME shell package installed"
          else
            echo "⚠️  GNOME shell package not found (may be image variant specific)"
          fi

          # Verify systemd and basic services
          systemctl is-system-running || true
          echo "✅ Systemd status checked"

          # Disk and filesystem checks
          df -h /
          echo "✅ Filesystem mounted and accessible"

          exit 0
          EOF

      - name: Test live app launch (GUI-agnostic)
        run: |
          # Test that key applications can be invoked (not necessarily GUI)
          ssh -i /tmp/vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -p 2222 root@127.0.0.1 << 'EOF'
          set -euo pipefail

          # Test GNOME-related apps without requiring display
          for app in gnome-control-center gnome-terminal nautilus; do
            if command -v ${app} &> /dev/null || \
               which ${app} &> /dev/null; then
              echo "✅ ${app} is available"
            else
              echo "⚠️  ${app} not found (may be variant-specific)"
            fi
          done

          echo "✅ Application availability check complete"
          EOF

      - name: Report installation validation
        if: always()
        run: |
          if [[ $? -eq 0 ]]; then
            echo "✅ INSTALLABILITY GATE PASSED"
            echo "Full installation, boot, and system validation successful"
            exit 0
          else
            echo "❌ INSTALLABILITY GATE FAILED"
            echo "Review boot.log and installer.log for details"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          # Kill running VMs
          for pid in ${INSTALLER_PID:-} ${BOOT_PID:-}; do
            if [[ -n "${pid}" ]] && ps -p ${pid} > /dev/null 2>&1; then
              kill ${pid} 2>/dev/null || true
            fi
          done
          sleep 2

          # Unmount and cleanup disks
          if [[ -n "${LOOP_DEVICE:-}" ]]; then
            sudo umount /mnt/install 2>/dev/null || true
            sudo umount /mnt/install/boot 2>/dev/null || true
            sudo losetup -d "${LOOP_DEVICE}" 2>/dev/null || true
          fi

          # Log diagnostics
          echo "=== Installer log (tail) ==="
          tail -50 installer.log 2>/dev/null || true
          echo "=== Boot log (tail) ==="
          tail -50 boot.log 2>/dev/null || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@3cecf7f8d93e44313b720dc976e146ef3ce39919 # v4
        with:
          name: installability-gate-logs
          path: |
            installer.log
            boot.log
          retention-days: 7
