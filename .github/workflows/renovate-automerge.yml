name: Renovate Auto-merge

on:
  workflow_run:
    workflows: ["PR Validation — testsuite"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.workflow_run.conclusion == 'success'
    uses: projectbluefin/actions/.github/workflows/reusable-renovate-automerge.yml@4d46a63f49ed0159e2f5958a2109cc936a50417e # v1
    with:
      head_sha: ${{ github.event.workflow_run.head_sha }}
