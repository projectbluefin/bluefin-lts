name: Renovate

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no PRs created or updated)'
        type: boolean
        default: false
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: renovate
  cancel-in-progress: false

permissions: {}

jobs:
  renovate:
    uses: projectbluefin/actions/.github/workflows/reusable-renovate.yml@fcd2a6bac15f2037df2e62572eef7a70fd25759f # v1
    with:
      dry_run: ${{ inputs.dry_run == true }}
    secrets:
      renovate_token: ${{ secrets.RENOVATE_TOKEN }}
