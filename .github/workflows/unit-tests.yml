name: Unit Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - build_scripts/**
      - tests/**
  push:
    branches:
      - main
      - testing
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run bats unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run unit tests
        run: bats tests/unit/
