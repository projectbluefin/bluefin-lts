name: Unit Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - build_scripts/**
      - tests/**
  push:
    branches:
      - main
      - testing
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run bats unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run unit tests
        run: bats tests/unit/
