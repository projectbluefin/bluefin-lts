name: Release Reminder

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  reminder:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-reminder.yml@c4e9e5511a984cc88623be152e140d96740185f5 # v1
    with:
      days_warn: 7
      days_escalate: 14
    secrets: inherit
