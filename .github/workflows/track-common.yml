name: Track Common Image

on:
  repository_dispatch:
    types: [common-updated]
  workflow_dispatch:

permissions: read-all

jobs:
  track:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get mergeraptor token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.MERGERAPTOR_APP_ID }}
          private-key: ${{ secrets.MERGERAPTOR_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: testing
          fetch-depth: 0

      - name: Fetch new common digest
        id: digest
        run: |
          set -euo pipefail
          NEW=$(skopeo inspect --raw docker://ghcr.io/projectbluefin/common:latest \
            | sha256sum | awk '{print "sha256:"$1}')
          CURRENT=$(awk '/name: common/{found=1} found && /digest:/{print $2; exit}' image-versions.yaml)
          echo "new=${NEW}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [ "$NEW" = "$CURRENT" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "common already up to date: ${NEW}"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "common digest: ${CURRENT} -> ${NEW}"
          fi

      - name: Open PR
        if: steps.digest.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_DIGEST: ${{ steps.digest.outputs.new }}
          OLD_DIGEST: ${{ steps.digest.outputs.current }}
        run: |
          set -euo pipefail
          BRANCH="auto/track-common"
          TITLE="chore(deps): update common digest"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          awk -v new="$NEW_DIGEST" '
            /^  - name: common$/ { in_common=1 }
            in_common && /^  - name:/ && !/^  - name: common$/ { in_common=0 }
            in_common && /^    digest:/ { print "    digest: " new; next }
            { print }
          ' image-versions.yaml > image-versions.yaml.tmp
          mv image-versions.yaml.tmp image-versions.yaml

          git stash push -- image-versions.yaml
          git checkout -B "$BRANCH" origin/testing
          git stash pop

          git add image-versions.yaml
          git commit -m "$TITLE"
          git push --force-with-lease origin "$BRANCH"

          {
            echo "## common digest update"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| **Image** | \`ghcr.io/projectbluefin/common:latest\` |"
            echo "| **Old** | \`${OLD_DIGEST:0:19}\` |"
            echo "| **New** | \`${NEW_DIGEST:0:19}\` |"
            echo ""
            echo "---"
            echo "*Generated by [Track Common Image](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          } > /tmp/pr-body.md

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body-file /tmp/pr-body.md
            gh pr edit "$EXISTING_PR" --base testing 2>/dev/null || true
            PR_URL=$(gh pr view "$EXISTING_PR" --json url --jq '.url')
          else
            PR_URL=$(gh pr create \
              --base testing \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body-file /tmp/pr-body.md)
          fi
          echo "PR: $PR_URL"
