name: PR E2E Gate (advisory)

# Composes system_files/ changes from the PR on top of bluefin-lts:testing
# and runs the smoke suite. Non-blocking — informational coverage only.
# The :testing publish gate lives in post-merge-e2e.yml (post-build smoke).
# See: issue #68, ACMM Level 3 bridge gap.
#
# Does NOT rebuild packages from build_scripts/ — that coverage comes from
# the post-merge e2e gate (post-merge-e2e.yml) after the full CI build.

on:
  pull_request:
    branches:
      - main
    paths:
      - "Containerfile"
      - "build_scripts/**"
      - "system_files/**"
      - "system_files_overrides/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  BASE_IMAGE: ghcr.io/projectbluefin/bluefin-lts:testing
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: bluefin-lts

jobs:
  compose:
    name: Compose PR test image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image-meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true

      - name: Generate image tag
        id: image-meta
        shell: bash
        run: |
          sha_short="${GITHUB_SHA::7}"
          compose_tag="e2e-pr-${{ github.event.pull_request.number }}-${sha_short}"
          echo "compose_tag=${compose_tag}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${compose_tag}" >> "$GITHUB_OUTPUT"

      - name: Write compose Containerfile
        shell: bash
        run: |
          cat <<'EOF' > Containerfile.pr-e2e
          FROM ${{ env.BASE_IMAGE }}

          COPY system_files/ /

          RUN glib-compile-schemas /usr/share/glib-2.0/schemas && \
              systemctl preset-all 2>/dev/null || true
          EOF

      - name: Build composed test image
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: ./Containerfile.pr-e2e
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.image-meta.outputs.compose_tag }}
          oci: true

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push composed test image
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          extra-args: |
            --compression-format=zstd:chunked

  e2e:
    name: E2E — PR compose smoke
    needs: compose
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ${{ needs.compose.outputs.image }}
      suites: smoke
    secrets: inherit
