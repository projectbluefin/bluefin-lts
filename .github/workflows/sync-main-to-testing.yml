name: Sync main â†’ testing

# In bluefin-lts the promotion flow is mainâ†’lts (not testingâ†’main), so
# this workflow serves two purposes:
# 1. Keeps the git testing branch mirrored from main so it stays available
#    for the planned migration to the testing-first model.
# 2. Acts as a timing signal: promote-testing-to-main.yml (mainâ†’lts)
#    listens for this workflow_run completion instead of push: main to
#    avoid racing the e2e gate on a new main push.
#
# Reusable logic lives in projectbluefin/actions. This is a thin caller.
#
# testing is not a protected branch; the reusable falls back to github.token
# when GH_TOKEN is not supplied, so no GitHub App token is needed here.

on:
  push:
    branches:
      - main

concurrency:
  group: sync-main-to-testing
  cancel-in-progress: false

jobs:
  sync:
    name: Keep testing up-to-date with main
    uses: projectbluefin/actions/.github/workflows/reusable-sync-branches.yml@v1
    permissions:
      contents: write

  cleanup-squash-branch:
    name: Delete squash promotion branch
    needs: [sync]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Delete auto/promote-testing-to-main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/git/refs/heads/auto/promote-testing-to-main \
            -X DELETE 2>/dev/null \
            && echo "âś… Deleted squash promotion branch" \
            || echo "Branch already deleted or does not exist â€” nothing to do"
