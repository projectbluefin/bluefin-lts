name: Sync main â†’ testing

# In bluefin-lts the promotion flow is mainâ†’lts (not testingâ†’main), so
# this workflow serves two purposes:
# 1. Keeps the git testing branch mirrored from main so it stays available
#    for the planned migration to the testing-first model.
# 2. Acts as a timing signal: promote-testing-to-main.yml (mainâ†’lts)
#    listens for this workflow_run completion instead of push: main to
#    avoid racing the e2e gate on a new main push.
#
# Reusable logic lives in projectbluefin/actions. This is a thin caller.

on:
  push:
    branches:
      - main

concurrency:
  group: sync-main-to-testing
  cancel-in-progress: false

jobs:
  sync:
    name: Keep testing up-to-date with main
    uses: projectbluefin/actions/.github/workflows/reusable-sync-branches.yml@v1
    secrets: inherit
    permissions:
      contents: write