repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
        - id: check-json
          exclude: \.devcontainer\.json
        - id: check-toml
        - id: check-yaml
        - id: end-of-file-fixer
        - id: trailing-whitespace
        - id: check-merge-conflict
        - id: detect-private-key
        - id: check-added-large-files
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
  - repo: local
    hooks:
      - id: no-floating-action-tags
        name: Block floating GitHub Action tags (@main, @v*)
        language: pygrep
        entry: 'uses:\s+(?!projectbluefin/(actions|bonedigger|testsuite)/).*@(main|master|latest|v[0-9]+(\.[0-9]+)*)\b'
        types: [yaml]
        files: '^\.github/workflows/'
      - id: no-sha-pins-for-internal-actions
        name: Block SHA pins for projectbluefin/actions and projectbluefin/testsuite refs (use @v1)
        language: pygrep
        entry: 'uses:.*projectbluefin/(actions|testsuite).*@[0-9a-f]{40}'
        types: [yaml]
        files: '(^\.github/workflows/.*\.yml$|action\.yml$)'
